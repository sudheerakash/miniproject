<nav>🩸 Find a Donor</nav>

<div class="form-container">

  <h2>Search Donor</h2>

  <!-- Blood Group Dropdown -->
  <select [(ngModel)]="blood">
    <option value="">Select Blood Group</option>
    <option value="A+">A+</option>
    <option value="A-">A-</option>
    <option value="B+">B+</option>
    <option value="B-">B-</option>
    <option value="O+">O+</option>
    <option value="O-">O-</option>
    <option value="AB+">AB+</option>
    <option value="AB-">AB-</option>
  </select>

  <!-- City Input -->
  <input type="text" [(ngModel)]="city" placeholder="Enter City">

  <!-- Search Button -->
  <button class="btn" (click)="search()">Search</button>

  <!-- Results -->
  <div *ngIf="results.length === 0 && blood && city">
    
  </div>

  <div *ngFor="let d of results" class="result-card">
    <strong>Name:</strong> {{ d.name }} <br>
    <strong>Blood:</strong> {{ d.blood }} <br>
    <strong>City:</strong> {{ d.city }} <br>
    <strong>Phone:</strong> {{ d.phone }}
  </div>

  <a routerLink="/" class="back">← Back to Home</a>

</div>

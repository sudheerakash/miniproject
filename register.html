<nav>🩸 Register as Donor</nav>

<div class="form-container">

  <h2>Become a Lifesaver</h2>

  <input [(ngModel)]="name" placeholder="Full Name">
  
  <select [(ngModel)]="blood">
  <option value="">Select Blood Group</option>
  <option value="A+">A+</option>
  <option value="A-">A-</option>
  <option value="B+">B+</option>
  <option value="B-">B-</option>
  <option value="O+">O+</option>
  <option value="O-">O-</option>
  <option value="AB+">AB+</option>
  <option value="AB-">AB-</option>
</select>

  <input [(ngModel)]="city" placeholder="City">
  <input [(ngModel)]="phone" placeholder="Phone">

  <button class="btn btn-red" (click)="register()">
    Register
  </button>
  
<a routerLink="/" class="back">← Back to Home</a>
    

</div>
